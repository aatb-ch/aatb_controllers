controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    constrained_position_controller:
      type: aatb_controllers/ConstrainedPositionController

constrained_position_controller:
  ros__parameters:
    # Joint names (must match robot description)
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6

    # Motion constraints per joint
    velocity_limits: [2.0, 2.0, 2.0, 3.0, 3.0, 3.0]           # rad/s
    acceleration_limits: [5.0, 5.0, 5.0, 7.0, 7.0, 7.0]       # rad/s²
    jerk_limits: [50.0, 50.0, 50.0, 80.0, 80.0, 80.0]         # rad/s³

    # Control cycle time (should match controller_manager update_rate)
    control_cycle_time: 0.001  # seconds (1000 Hz)

    # Interface configuration
    interface_name: position

    state_interfaces:
      - position
      - velocity